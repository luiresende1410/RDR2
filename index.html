<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1410">
  <meta name="description" content="Mapa interativo não oficial de Red Dead Redemption 2.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>RDR2 — Mapa Interativo</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css?v=20260718-map">
</head>
<body>
  <aside class="sidebar" id="sidebar" aria-label="Filtros do mapa">
    <header class="sidebar-header">
      <div class="brand-mark" aria-hidden="true">R</div>
      <div class="brand-copy">
        <h1>Red Dead Map</h1>
      </div>
      <button class="icon-button sidebar-close" id="sidebarClose" type="button" aria-label="Fechar filtros">×</button>
    </header>

    <div class="search-box">
      <span aria-hidden="true">⌕</span>
      <input type="search" id="searchInput" aria-label="Buscar no mapa" placeholder="Buscar local, cavalo ou tesouro..." autocomplete="off">
    </div>

    <section class="progress-section" aria-label="Progresso">
      <div class="spoiler-filter">
        <label for="chapterSelect">📖 Capítulo:</label>
        <select id="chapterSelect">
          <option value="1">Cap. 1 — Colter</option>
          <option value="2">Cap. 2 — Horseshoe</option>
          <option value="3">Cap. 3 — Clemens Point</option>
          <option value="4">Cap. 4 — Shady Belle</option>
          <option value="5">Cap. 5 — Guarma</option>
          <option value="6">Cap. 6 — Beaver Hollow</option>
          <option value="7" selected>Epílogo — Tudo</option>
        </select>
      </div>
      <div class="progress-heading">
        <span>Progresso</span>
        <strong id="progressText">0 / 0</strong>
      </div>
      <div class="progress-bar" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
    </section>

    <label class="select-all-section" for="selectAllCategories">
      <input type="checkbox" id="selectAllCategories" checked>
      <span>Mostrar todas as categorias</span>
      <small id="visibleMarkersCount">0 locais</small>
    </label>

    <nav class="categories" id="categories" aria-label="Categorias"></nav>

    <div class="sidebar-tabs">
      <button class="tab-btn active" id="tabMap" type="button">🗺️ Mapa</button>
      <button class="tab-btn" id="tabGuide" type="button">📘 Guia</button>
    </div>
    <div class="guide-panel" id="guidePanel">
      <div class="guide-nav">
        <button class="guide-tab active" data-section="horses">🐴 Cavalos</button>
        <button class="guide-tab" data-section="weapons">🔫 Armas</button>
        <button class="guide-tab" data-section="items">💎 Itens</button>
      </div>
      <div class="guide-content" id="guideContent"></div>
    </div>

    <footer class="sidebar-footer">
      <button class="btn-checklist" id="btnChecklist" type="button" onclick="window.RDR2Checklist.toggleChecklist()">🏆 Checklist 100%</button>
      <div class="backup-buttons">
        <button class="btn-backup" id="btnExport" type="button">⬇ Exportar</button>
        <button class="btn-backup" id="btnImport" type="button">⬆ Importar</button>
      </div>
      <button class="btn-reset" id="btnReset" type="button">↻ Resetar progresso</button>
      <p>Dados salvos somente neste dispositivo.</p>
    </footer>
  </aside>

  <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Abrir filtros">☰</button>

  <main id="map" aria-label="Mapa interativo de Red Dead Redemption 2"></main>

  <div id="checklistPanel" class="checklist-panel"></div>

  <div class="map-hint" id="mapHint">
    <span>Arraste para explorar</span><span class="separator">•</span><span>Use a roda ou pinça para ampliar</span>
  </div>

  <noscript>Este mapa precisa de JavaScript habilitado.</noscript>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/markers-data.js?v=20260719-import"></script>
  <script src="js/game-data.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/spoiler.js"></script>
  <script src="js/checklist.js"></script>
  <script src="js/app.js?v=20260720-guide"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
