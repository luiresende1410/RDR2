<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RDR2 Interactive Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>RDR2 Map</h1>
      <button class="sidebar-close" id="sidebarClose">&times;</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar localização...">
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
      <span class="progress-text" id="progressText">0 / 0 encontrados</span>
    </div>
    <div class="categories" id="categories"></div>
    <div class="sidebar-footer">
      <button class="btn-reset" id="btnReset">Resetar Progresso</button>
    </div>
  </aside>
  <button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/markers-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
